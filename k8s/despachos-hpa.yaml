apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: innovatech-despachos-hpa
  namespace: innovatech
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: innovatech-despachos
  minReplicas: 1
  maxReplicas: 3
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70